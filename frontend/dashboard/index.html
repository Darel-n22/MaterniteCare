<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MaterniteCare – Espace soignant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="appbar">
    <div class="appbar__brand">
        <img src="../logo.jpeg" alt="MaterniteCare" class="appbar__logo-img">
        <div class="appbar__logo-text">
            <h1>MaterniteCare</h1>
            <p>Espace soignant · Monitoring</p>
        </div>
    </div>
    <button type="button" id="btnLogout" class="btn-logout" style="display: none;">Se déconnecter</button>
</header>
<div class="pulse-divider" aria-hidden="true">
    <svg viewBox="0 0 160 26" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 13 H44 L54 4 L66 24 L76 13 H160 L204 13 L214 4 L226 24 L236 13 H320" fill="none" stroke="#E87A3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
</div>

<main class="container">

    <!-- Zone de connexion -->
    <section id="loginZone" class="login-card">
        <div class="login-card__icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="#3A77A8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="40" height="40" xmlns="http://www.w3.org/2000/svg"><path d="M4.5 5.5A2.5 2.5 0 017 3h0a2.5 2.5 0 012.5 2.5V12a4.5 4.5 0 009 0v-1a2 2 0 10-2 0v1a2.5 2.5 0 01-5 0V5.5A2.5 2.5 0 0114 3h0a2.5 2.5 0 012.5 2.5"/><circle cx="18.5" cy="11" r="1.5" fill="#3A77A8" stroke="none"/></svg></div>
        <h2>Accès soignant</h2>
        <p class="lead">Connectez-vous avec vos identifiants professionnels.</p>

        <label for="email">Email professionnel</label>
        <input type="email" id="email" placeholder="prenom.nom@maternite.cg" autocomplete="off">

        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••">

        <div id="loginError" class="error"></div>
        <button type="button" id="btnLogin">Se connecter</button>

        <p class="info"><svg style="vertical-align:middle;margin-right:5px" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg> Utilisez les identifiants fournis par l'administration.</p>
    </section>

    <!-- Dashboard (caché au départ) -->
    <section id="dashboardZone" style="display: none;">
        <div class="carnet-header">
            <p class="carnet-header__eyebrow">Tableau de bord</p>
            <h2>Bonjour, <span id="userName"></span> <span id="alertBadge" style="display:none; background:#E87A3E; color:white; border-radius:50%; padding:4px 10px; font-size:0.8rem; margin-left:10px;">0</span></h2>
            <div class="carnet-meta">
                <span class="carnet-stamp" id="userRole"></span>
                <span class="carnet-tag" id="userWorkspace"></span>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="searchLot" placeholder="Rechercher par lot de vaccin (ex. LOT-VAT-2026-A12)">
            <button id="btnSearch" class="search-btn"><svg style="vertical-align:middle;margin-right:6px" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Corrélation clinique</button>
        </div>

        <div class="stats-row">
            <div class="stat-card"><span class="stat-value" id="statTotal">0</span> <span class="stat-label">Patientes actives</span></div>
            <div class="stat-card stat-card--alert"><span class="stat-value" id="statRouge">0</span> <span class="stat-label">Urgences</span></div>
            <div class="stat-card stat-card--critical"><span class="stat-value" id="statCritique">0</span> <span class="stat-label">Dossiers critiques</span></div>
        </div>

        <div id="patientList" class="patient-grid">
            <!-- Cartes patientes injectées ici -->
        </div>
    </section>
</main>

<script src="js/dashboard.js"></script>
</body>
</html>
